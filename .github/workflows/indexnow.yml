name: "IndexNow"
on:
  # 保留每日定时推送
  schedule:
    - cron:  '0 0,12 * * *'
  # 支持 API 调用和手动触发
  workflow_dispatch:

jobs:
  check-and-submit:
    runs-on: ubuntu-latest
    steps:
      - name: submit-to-bing
        uses: bojieyang/indexnow-action@v1
        with:
          sitemap-location: "https://blog.rusin7.com/sitemap.xml"
          endpoint: "www.bing.com"
          since: 1
          since-unit: "day"
          limit: 100
          key: ${{ secrets.INDEXNOW_KEY }}
          key-location: ${{ secrets.INDEXNOW_KEY_LOCATION }}