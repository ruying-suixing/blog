name: "IndexNow"
on:
  push:
    branches: [ main ]
  schedule:
    - cron: '0 0,12 * * *'

jobs:
  check-and-submit:
    runs-on: ubuntu-latest
    steps:
      - name: 轮询等待 sitemap 更新（最长等待10分钟）
        run: |
          SITEMAP_URL="https://blog.rusin7.com/sitemap.xml"
          # 获取当前线上 sitemap 的最后修改时间
          OLD_LM=$(curl -sI "$SITEMAP_URL" | grep -i "last-modified" | cut -d' ' -f2-)
          echo "当前 sitemap 最后修改时间: $OLD_LM"

          # 循环检测20次，每次间隔30秒，总计最长等待10分钟
          for i in {1..20}; do
            sleep 30
            NEW_LM=$(curl -sI "$SITEMAP_URL" | grep -i "last-modified" | cut -d' ' -f2-)
            echo "第 $i 次检测，当前最后修改时间: $NEW_LM"
            
            if [ "$NEW_LM" != "$OLD_LM" ] && [ -n "$NEW_LM" ]; then
              echo "✅ sitemap 已更新，开始推送"
              exit 0
            fi
          done
          
          echo "⚠️ 等待超时，仍按计划执行推送"
      
      - name: submit-to-bing
        uses: bojieyang/indexnow-action@v1
        with:
          sitemap-location: "https://blog.rusin7.com/sitemap.xml"
          endpoint: "www.bing.com"
          since: 1
          since-unit: "day"
          limit: 100
          key: 38f04a13dd0342549743e0544ce58824
          key-location: https://blog.rusin7.com/38f04a13dd0342549743e0544ce58824.txt