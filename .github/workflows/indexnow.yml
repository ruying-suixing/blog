name: IndexNow Bing Push
on: push
jobs:
  push:
    runs-on: ubuntu-latest
    env:
      SITE: https://blog.rusin7.com
      KEY: ea37828cb589480db33d67608a3fb94f
    steps:
      - uses: actions/checkout@v4
      - name: 安装依赖
        run: npm i hexo hexo-generator-sitemap
      - name: 生成 sitemap
        run: npx hexo g
      - name: 提取链接推送
        run: |
          sudo apt install xmlstarlet -y
          xmlstarlet sel -T -t -m "//xmlns:url/xmlns:loc" -v . -n public/sitemap.xml | while read u; do
            curl "https://api.indexnow.org/indexnow?url=$u&key=$KEY"
            sleep 1
          done
