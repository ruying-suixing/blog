name: IndexNow Bing Push
on: push
jobs:
  push-urls:
    runs-on: ubuntu-latest
    env:
      SITE: https://blog.rusin7.com
      KEY: ea37828cb589480db33d67608a3fb94f
    steps:
      - uses: actions/checkout@v4

      # 自带node/npm，无需额外安装pnpm
      - name: 安装 Hexo 与 sitemap 插件
        run: npm i hexo hexo-generator-sitemap

      - name: 构建静态页面生成 sitemap
        run: |
          npx hexo clean
          npx hexo generate
          echo "==== public目录文件 ===="
          ls -la public
          test -f public/sitemap.xml && echo "sitemap.xml 存在" || echo "sitemap.xml 缺失"

      - name: 安装 xmlstarlet
        run: sudo apt install xmlstarlet -y

      - name: 提取链接推送 IndexNow
        run: |
          xmlstarlet sel -N sm=http://www.sitemaps.org/schemas/sitemap/0.9 \
            -t -m "//sm:url/sm:loc" -v . -n public/sitemap.xml > urls.txt

          echo "==== 待推送链接列表 ===="
          cat urls.txt

          while read -r url; do
            [ -z "$url" ] && continue
            echo "正在推送: $url"
            curl -s "https://api.indexnow.org/indexnow?url=$url&key=$KEY&keyLocation=https://blog.rusin7.com/$KEY.txt"
            echo -e "\n---"
            sleep 0.5
          done < urls.txt
